<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280" role="img" aria-label="Collection of vintage postage stamps arranged on an album page">
  <title>Stamp Collection on Album Page</title>
  <defs>
    <pattern id="album-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="40" stroke="#d4c9b0" stroke-width="0.3" opacity="0.5"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#d4c9b0" stroke-width="0.3" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Album page background -->
  <rect x="0" y="0" width="400" height="280" rx="4" fill="#f5f0e8"/>
  <rect x="0" y="0" width="400" height="280" rx="4" fill="url(#album-grid)"/>

  <!-- Stamp 1: Blue (top-left) -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="80" height="100" rx="2" fill="#2b4c7e" stroke="#1a3050" stroke-width="0.5"/>
    <rect x="4" y="4" width="72" height="92" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <circle cx="40" cy="45" r="20" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.4"/>
    <text x="40" y="50" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="11" opacity="0.7">5c</text>
    <text x="40" y="88" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="7" letter-spacing="1">U.S.POSTAGE</text>
  </g>

  <!-- Stamp 2: Red (top-center) -->
  <g transform="translate(120, 15) rotate(2)">
    <rect x="0" y="0" width="90" height="65" rx="2" fill="#c0392b" stroke="#8b1a1a" stroke-width="0.5"/>
    <rect x="4" y="4" width="82" height="57" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <text x="45" y="35" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="16" font-weight="bold" opacity="0.8">2c</text>
    <text x="45" y="52" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="6" letter-spacing="1">WASHINGTON</text>
  </g>

  <!-- Stamp 3: Green (top-right) -->
  <g transform="translate(240, 20)">
    <rect x="0" y="0" width="70" height="90" rx="2" fill="#4a8c5c" stroke="#2d6b3f" stroke-width="0.5"/>
    <rect x="3" y="3" width="64" height="84" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <rect x="12" y="12" width="46" height="46" rx="1" fill="#f5f0e8" opacity="0.15"/>
    <text x="35" y="75" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="8" letter-spacing="1">1c</text>
    <text x="35" y="85" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="5" letter-spacing="0.5">FRANKLIN</text>
  </g>

  <!-- Stamp 4: Gold/Brown (bottom-left) -->
  <g transform="translate(30, 145) rotate(-1)">
    <rect x="0" y="0" width="100" height="70" rx="2" fill="#8b6914" stroke="#6b4f0e" stroke-width="0.5"/>
    <rect x="4" y="4" width="92" height="62" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <text x="50" y="30" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="8" letter-spacing="2">AIRMAIL</text>
    <text x="50" y="48" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="14" font-weight="bold">6c</text>
    <text x="50" y="60" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="5" letter-spacing="1">UNITED STATES</text>
  </g>

  <!-- Stamp 5: Purple (bottom-center) -->
  <g transform="translate(155, 140)">
    <rect x="0" y="0" width="75" height="95" rx="2" fill="#6b3fa0" stroke="#4a2d70" stroke-width="0.5"/>
    <rect x="3" y="3" width="69" height="89" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <circle cx="37" cy="42" r="22" fill="none" stroke="#f5f0e8" stroke-width="0.8" opacity="0.4"/>
    <text x="37" y="47" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="12" font-weight="bold">3c</text>
    <text x="37" y="80" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="6" letter-spacing="1">LIBERTY</text>
  </g>

  <!-- Stamp 6: Navy (bottom-right) -->
  <g transform="translate(260, 150) rotate(1.5)">
    <rect x="0" y="0" width="110" height="75" rx="2" fill="#1a3050" stroke="#0d1e30" stroke-width="0.5"/>
    <rect x="4" y="4" width="102" height="67" rx="1" fill="none" stroke="#f5f0e8" stroke-width="1" opacity="0.6"/>
    <text x="55" y="28" text-anchor="middle" fill="#8bb8e0" font-family="Georgia, serif" font-size="7" letter-spacing="2">COMMEMORATIVE</text>
    <text x="55" y="48" text-anchor="middle" fill="#f5f0e8" font-family="Georgia, serif" font-size="18" font-weight="bold">10c</text>
    <text x="55" y="64" text-anchor="middle" fill="#8bb8e0" font-family="Georgia, serif" font-size="6" letter-spacing="1">SPECIAL DELIVERY</text>
  </g>

  <!-- Album hinge marks (transparent tape effect) -->
  <rect x="45" y="16" width="30" height="8" rx="1" fill="#d4c9b0" opacity="0.3"/>
  <rect x="147" y="12" width="35" height="7" rx="1" fill="#d4c9b0" opacity="0.3"/>
  <rect x="260" y="16" width="28" height="8" rx="1" fill="#d4c9b0" opacity="0.3"/>
  <rect x="58" y="140" width="32" height="8" rx="1" fill="#d4c9b0" opacity="0.3"/>
  <rect x="175" y="136" width="30" height="7" rx="1" fill="#d4c9b0" opacity="0.3"/>
  <rect x="290" y="145" width="34" height="8" rx="1" fill="#d4c9b0" opacity="0.3"/>
</svg>
