<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300" role="img" aria-label="Vintage postage stamp frame">
  <title>Vintage Stamp Frame</title>
  <defs>
    <!-- Perforation pattern for stamp edges -->
    <pattern id="perf-top" x="0" y="0" width="20" height="12" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="0" r="5" fill="#f5f0e8"/>
    </pattern>
    <pattern id="perf-bottom" x="0" y="0" width="20" height="12" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="12" r="5" fill="#f5f0e8"/>
    </pattern>
    <pattern id="perf-left" x="0" y="0" width="12" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="10" r="5" fill="#f5f0e8"/>
    </pattern>
    <pattern id="perf-right" x="0" y="0" width="12" height="20" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="10" r="5" fill="#f5f0e8"/>
    </pattern>
  </defs>
  <!-- Stamp background -->
  <rect x="12" y="12" width="216" height="276" rx="2" fill="#f5f0e8" stroke="#d4c9b0" stroke-width="1"/>
  <!-- Perforated edges -->
  <rect x="12" y="0" width="216" height="12" fill="url(#perf-top)"/>
  <rect x="12" y="288" width="216" height="12" fill="url(#perf-bottom)"/>
  <rect x="0" y="12" width="12" height="276" fill="url(#perf-left)"/>
  <rect x="228" y="12" width="12" height="276" fill="url(#perf-right)"/>
  <!-- Inner border -->
  <rect x="24" y="24" width="192" height="252" rx="1" fill="none" stroke="#2b4c7e" stroke-width="2"/>
  <!-- Denomination area -->
  <rect x="150" y="30" width="60" height="24" rx="2" fill="#2b4c7e"/>
  <text x="180" y="47" text-anchor="middle" fill="#f5f0e8" font-family="'Courier New', monospace" font-size="12" font-weight="bold">USA 37</text>
  <!-- Decorative vignette frame -->
  <rect x="40" y="64" width="160" height="160" rx="4" fill="none" stroke="#8b6914" stroke-width="1.5"/>
  <rect x="44" y="68" width="152" height="152" rx="3" fill="none" stroke="#8b6914" stroke-width="0.5"/>
  <!-- Simplified eagle/crest in vignette -->
  <circle cx="120" cy="140" r="50" fill="none" stroke="#2b4c7e" stroke-width="1" opacity="0.4"/>
  <path d="M120 100 L130 125 L155 125 L135 140 L143 165 L120 150 L97 165 L105 140 L85 125 L110 125 Z" fill="#2b4c7e" opacity="0.2"/>
  <!-- Country name -->
  <text x="120" y="248" text-anchor="middle" fill="#2b4c7e" font-family="Georgia, serif" font-size="14" font-weight="bold" letter-spacing="3">UNITED STATES</text>
  <!-- Bottom text -->
  <text x="120" y="266" text-anchor="middle" fill="#5a4a3a" font-family="Georgia, serif" font-size="9" letter-spacing="1">POSTAGE</text>
</svg>
